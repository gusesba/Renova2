services:
  postgres:
    image: postgres:17-alpine
    container_name: renova-postgres-prod
    environment:
      POSTGRES_DB: renova
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - renova-postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d renova"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: renova-api-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=renova;Username=postgres;Password=${POSTGRES_PASSWORD:-change-me}
      Cors__AllowedOrigins__0: https://renovacuritiba.com.br
      Cors__AllowedOrigins__1: https://www.renovacuritiba.com.br
      Cors__AllowedOrigins__2: https://app.renovacuritiba.com.br
      Cors__AllowedOrigins__3: https://api.renovacuritiba.com.br
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    container_name: renova-caddy
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  renova-postgres-prod-data:
  caddy-data:
  caddy-config:
